- name: silver.patients
  columns:
    resource_id: varchar
    source: varchar
    gender: varchar
    birth_date: date
    deceased_datetime: timestamp
    race: varchar
    ethnicity: varchar

- name: silver.encounters
  columns:
    resource_id: varchar
    source: varchar
    patient_id: varchar
    encounter_class: varchar
    status: varchar
    period_start: timestamp
    period_end: timestamp
    type_code: varchar
    type_display: varchar
    type_system: varchar
    reason_code: varchar
    reason_display: varchar
    admit_source: varchar
    discharge_disposition: varchar
    service_type: varchar
    priority_code: varchar
    parent_encounter_id: varchar
    location_id: varchar

- name: silver.conditions
  columns:
    resource_id: varchar
    source: varchar
    patient_id: varchar
    encounter_id: varchar
    clinical_status: varchar
    verification_status: varchar
    category: varchar
    code: varchar
    code_system: varchar
    code_display: varchar
    onset_datetime: timestamp
    abatement_datetime: timestamp
    recorded_date: timestamp

- name: silver.procedure
  columns:
    resource_id: varchar
    snomed_ct_id: varchar
    snomed_ct_procedure: varchar
    status: varchar
    patient_id: varchar
    encounter_id: varchar
    performed_datetime: timestamp

- name: silver.medication_dispense
  columns:
    resource_id: varchar
    status: varchar
    encounter_id: varchar
    patient_id: varchar
    medication_code: varchar
    medication_name: varchar
    handed_over_timestamp: timestamp

- name: silver.location
  columns:
    resource_id: varchar
    name: varchar
    is_active: int
    loaction_physical_type: varchar
    organization_id: varchar

- name: silver.organization
  columns:
    resource_id: varchar
    name: varchar
    is_active: varchar
    npi_value: int
