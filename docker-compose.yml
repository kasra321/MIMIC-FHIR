services:
  fhir-ingestion:
    build: .
    entrypoint: ["/app/run_pipeline.sh", "fhir-ingestion"]
    volumes:
      - ./data/raw:/data/raw:ro
      - ./data/warehouse:/data/warehouse

  vitals-pipeline:
    build: .
    entrypoint: ["/app/run_pipeline.sh", "vitals-pipeline"]
    volumes:
      - ./data/warehouse:/data/warehouse
